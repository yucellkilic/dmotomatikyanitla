<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DM Otomasyon — Randevu Yönetim Platformu</title>
    <meta name="description"
        content="İşletmeniz için 7/24 online randevu sistemi. Chatbot, takvim, müşteri yönetimi tek platformda." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #08080d;
            --surface: #111118;
            --surface-2: #1a1a24;
            --surface-3: #22222f;
            --border: #2a2a3d;
            --accent: #a78bfa;
            --accent-dark: #6d28d9;
            --accent-glow: rgba(167, 139, 250, .15);
            --success: #34d399;
            --danger: #f87171;
            --text: #eaeaf2;
            --text-dim: #8888a4;
            --text-muted: #5c5c78;
            --radius: 12px;
            --radius-lg: 16px;
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text)
        }

        /* ── Layout ── */
        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            max-width: 1040px;
            width: 100%;
            align-items: center
        }

        @media (max-width: 820px) {
            .container {
                grid-template-columns: 1fr;
                gap: 32px;
                max-width: 460px
            }

            .hero {
                text-align: center
            }

            .features {
                justify-content: center
            }
        }

        /* ── Hero (Left) ── */
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 50px;
            background: var(--accent-glow);
            border: 1px solid rgba(167, 139, 250, .2);
            color: var(--accent);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px
        }

        .hero h1 {
            font-size: 40px;
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff 30%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .hero p {
            font-size: 16px;
            color: var(--text-dim);
            line-height: 1.7;
            margin-bottom: 28px;
            max-width: 420px
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 12px
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dim)
        }

        .feature .icon {
            font-size: 16px
        }

        /* ── Auth Card ── */
        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px 28px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, .4)
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: var(--surface-2);
            border-radius: 10px;
            padding: 4px
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s
        }

        .auth-tab.active {
            background: var(--accent-dark);
            color: #fff;
            box-shadow: 0 2px 8px rgba(109, 40, 217, .3)
        }

        /* Form */
        .auth-form {
            display: none
        }

        .auth-form.active {
            display: block;
            animation: fadeIn .3s ease both
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .form-group {
            margin-bottom: 14px
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: .5px
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border .2s
        }

        .form-group input:focus {
            border-color: var(--accent)
        }

        .form-group input::placeholder {
            color: var(--text-muted)
        }

        .slug-preview {
            margin-top: 5px;
            font-size: 11px;
            color: var(--text-muted);
            word-break: break-all
        }

        .slug-preview span {
            color: var(--accent);
            font-weight: 600
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 16px 0
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: var(--radius);
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            margin-top: 6px
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px var(--accent-glow)
        }

        .btn:disabled {
            opacity: .5;
            cursor: not-allowed
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .msg {
            padding: 12px 14px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            margin-top: 12px
        }

        .msg.error {
            background: rgba(248, 113, 113, .12);
            color: var(--danger);
            border: 1px solid rgba(248, 113, 113, .25)
        }

        .msg.success {
            background: rgba(52, 211, 153, .1);
            color: var(--success);
            border: 1px solid rgba(52, 211, 153, .25)
        }

        .footer-note {
            text-align: center;
            margin-top: 18px;
            font-size: 12px;
            color: var(--text-muted)
        }

        .footer-note a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600
        }

        .hidden {
            display: none !important
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="container">
            <!-- ═══ LEFT: Hero ═══ -->
            <div class="hero">
                <div class="hero-badge">🚀 Yeni nesil randevu yönetimi</div>
                <h1>Randevularınızı Otomatize Edin</h1>
                <p>Müşterileriniz 7/24 online randevu alsın. Chatbot, takvim ve müşteri yönetimi tek platformda, kolay
                    kurulum.</p>
                <div class="features">
                    <div class="feature"><span class="icon">🤖</span> AI Chatbot</div>
                    <div class="feature"><span class="icon">📅</span> Takvim</div>
                    <div class="feature"><span class="icon">🌐</span> Online Booking</div>
                    <div class="feature"><span class="icon">⚡</span> Anında Kurulum</div>
                    <div class="feature"><span class="icon">🔒</span> Güvenli</div>
                    <div class="feature"><span class="icon">📱</span> Mobil Uyumlu</div>
                </div>
            </div>

            <!-- ═══ RIGHT: Auth Card ═══ -->
            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">Giriş Yap</button>
                    <button class="auth-tab" onclick="switchTab('register')">Kayıt Ol</button>
                </div>

                <!-- Login Form -->
                <div class="auth-form active" id="loginForm">
                    <div class="form-group">
                        <label>E-posta</label>
                        <input type="email" id="loginEmail" placeholder="ornek@email.com" autocomplete="email" />
                    </div>
                    <div class="form-group">
                        <label>Şifre</label>
                        <input type="password" id="loginPassword" placeholder="••••••••"
                            autocomplete="current-password" />
                    </div>
                    <button class="btn" id="loginBtn" onclick="handleLogin()">Giriş Yap</button>
                    <div id="loginMsg"></div>
                </div>

                <!-- Register Form -->
                <div class="auth-form" id="registerForm">
                    <div class="form-group">
                        <label>İşletme Adı</label>
                        <input type="text" id="regBizName" placeholder="Örn: Kuaför Ayşe" oninput="generateSlug()" />
                    </div>
                    <div class="form-group">
                        <label>İşletme Linki (Slug)</label>
                        <input type="text" id="regSlug" placeholder="kuafor-ayse" oninput="updatePreview()" />
                        <div class="slug-preview" id="slugPreview"></div>
                    </div>
                    <div class="divider"></div>
                    <div class="form-group">
                        <label>E-posta</label>
                        <input type="email" id="regEmail" placeholder="ornek@email.com" autocomplete="email" />
                    </div>
                    <div class="form-group">
                        <label>Şifre</label>
                        <input type="password" id="regPassword" placeholder="En az 6 karakter"
                            autocomplete="new-password" />
                    </div>
                    <button class="btn" id="regBtn" onclick="handleRegister()">Kayıt Ol</button>
                    <div id="regMsg"></div>
                </div>

                <div class="footer-note">
                    <a href="/demo">Chatbot Demoyu Dene →</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        var sb = null;

        // ─── Init Supabase ────────────────────
        (async function () {
            try {
                var res = await fetch("/api/config");
                var config = await res.json();
                sb = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);

                // Auto redirect if already logged in
                var { data: { session } } = await sb.auth.getSession();
                if (session) {
                    window.location.href = "/admin";
                }
            } catch (e) {
                console.error("Config yüklenemedi:", e);
            }

            // Check URL for tab hint
            if (window.location.pathname === "/register" || window.location.hash === "#register") {
                switchTab("register");
            }
        })();

        // ─── Tab Switch ───────────────────────
        function switchTab(tab) {
            document.querySelectorAll(".auth-tab").forEach(function (t, i) {
                t.classList.toggle("active", (tab === "login" && i === 0) || (tab === "register" && i === 1));
            });
            document.getElementById("loginForm").classList.toggle("active", tab === "login");
            document.getElementById("registerForm").classList.toggle("active", tab === "register");
        }

        // ─── Login ────────────────────────────
        async function handleLogin() {
            var btn = document.getElementById("loginBtn");
            var msgEl = document.getElementById("loginMsg");
            msgEl.innerHTML = "";

            var email = document.getElementById("loginEmail").value.trim();
            var password = document.getElementById("loginPassword").value;

            if (!email || !password) {
                msgEl.innerHTML = '<div class="msg error">E-posta ve şifre gerekli.</div>';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Giriş yapılıyor...';

            try {
                var { data, error } = await sb.auth.signInWithPassword({ email: email, password: password });
                if (error) {
                    msgEl.innerHTML = '<div class="msg error">' + error.message + '</div>';
                    btn.disabled = false;
                    btn.textContent = "Giriş Yap";
                    return;
                }
                window.location.href = "/admin";
            } catch (e) {
                msgEl.innerHTML = '<div class="msg error">Bağlantı hatası.</div>';
                btn.disabled = false;
                btn.textContent = "Giriş Yap";
            }
        }

        // ─── Register: Slug Generation ────────
        var trMap = { 'ç': 'c', 'ğ': 'g', 'ı': 'i', 'ö': 'o', 'ş': 's', 'ü': 'u', 'Ç': 'c', 'Ğ': 'g', 'İ': 'i', 'Ö': 'o', 'Ş': 's', 'Ü': 'u' };

        function toSlug(text) {
            var result = '';
            for (var i = 0; i < text.length; i++) {
                result += trMap[text[i]] || text[i];
            }
            return result.toLowerCase().replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
        }

        function generateSlug() {
            var slug = toSlug(document.getElementById('regBizName').value);
            document.getElementById('regSlug').value = slug;
            updatePreview();
        }

        function updatePreview() {
            var slug = toSlug(document.getElementById('regSlug').value);
            document.getElementById('regSlug').value = slug;
            var el = document.getElementById('slugPreview');
            el.innerHTML = slug ? 'Randevu linkiniz: <span>' + window.location.origin + '/book/' + slug + '</span>' : '';
        }

        // ─── Register: Submit ─────────────────
        async function handleRegister() {
            var btn = document.getElementById("regBtn");
            var msgEl = document.getElementById("regMsg");
            msgEl.innerHTML = "";

            var businessName = document.getElementById("regBizName").value.trim();
            var slug = document.getElementById("regSlug").value.trim();
            var email = document.getElementById("regEmail").value.trim();
            var password = document.getElementById("regPassword").value;

            if (!businessName || !slug || !email || !password) {
                msgEl.innerHTML = '<div class="msg error">Tüm alanları doldurun.</div>';
                return;
            }
            if (password.length < 6) {
                msgEl.innerHTML = '<div class="msg error">Şifre en az 6 karakter olmalıdır.</div>';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Kaydediliyor...';

            try {
                var res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password, businessName: businessName, slug: slug })
                });
                var data = await res.json();

                if (!res.ok) {
                    msgEl.innerHTML = '<div class="msg error">' + (data.error || 'Bir hata oluştu.') + '</div>';
                    btn.disabled = false;
                    btn.textContent = 'Kayıt Ol';
                    return;
                }

                msgEl.innerHTML = '<div class="msg success">🎉 Kayıt başarılı! Otomatik giriş yapılıyor...</div>';

                // Auto-login after registration
                var { error: loginErr } = await sb.auth.signInWithPassword({ email: email, password: password });
                if (!loginErr) {
                    setTimeout(function () { window.location.href = "/admin"; }, 1000);
                } else {
                    msgEl.innerHTML = '<div class="msg success">🎉 Kayıt başarılı! Giriş Yap sekmesinden giriş yapabilirsiniz.</div>';
                    btn.textContent = '✅ Kayıt Tamamlandı';
                    setTimeout(function () { switchTab("login"); }, 2000);
                }
            } catch (e) {
                msgEl.innerHTML = '<div class="msg error">Bağlantı hatası.</div>';
                btn.disabled = false;
                btn.textContent = 'Kayıt Ol';
            }
        }
    </script>
</body>

</html>
