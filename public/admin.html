<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DM Otomasyon — Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0b0b10;
      --surface: #13131a;
      --surface-2: #1c1c28;
      --surface-3: #252535;
      --border: #2e2e42;
      --accent: #a78bfa;
      --accent-hover: #c4b5fd;
      --accent-glow: rgba(167, 139, 250, .18);
      --danger: #f87171;
      --danger-hover: #fca5a5;
      --success: #34d399;
      --text: #e8e8f0;
      --text-dim: #8888a4;
      --text-muted: #5c5c78;
      --radius: 12px;
      --radius-lg: 16px;
      --transition: .2s cubic-bezier(.4, 0, .2, 1);
    }

    html,
    body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text)
    }

    /* ── Layout ───────────────────────────── */
    .app {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px 16px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column
    }

    /* ── Header ──────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-radius: var(--radius-lg);
      background: var(--surface);
      border: 1px solid var(--border);
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px
    }

    .header-logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #6d28d9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 0 16px var(--accent-glow);
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -.3px
    }

    .header-subtitle {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 1px
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap
    }

    /* ── Buttons ─────────────────────────── */
    .btn {
      padding: 9px 18px;
      border-radius: 10px;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #6d28d9);
      color: #fff;
      box-shadow: 0 0 14px var(--accent-glow);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 24px var(--accent-glow)
    }

    .btn-ghost {
      background: var(--surface-2);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--text-dim)
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger)
    }

    .btn-danger:hover {
      background: var(--danger);
      color: #fff
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none
    }

    /* ── Card / Section ──────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      animation: fadeIn .35s var(--transition) both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* ── Login ───────────────────────────── */
    #loginSection {
      max-width: 400px;
      margin: 80px auto;
    }

    #loginSection h2 {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px
    }

    #loginSection p.subtitle {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 28px
    }

    .form-group {
      margin-bottom: 16px
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border var(--transition), box-shadow var(--transition);
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow)
    }

    .form-group input::placeholder {
      color: var(--text-muted)
    }

    .login-btn {
      width: 100%;
      justify-content: center;
      padding: 13px;
      font-size: 15px;
      margin-top: 8px
    }

    .error-msg {
      color: var(--danger);
      font-size: 12px;
      text-align: center;
      margin-top: 12px;
      min-height: 18px;
    }

    /* ── Toolbar ──────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .toolbar select {
      padding: 10px 14px;
      border-radius: 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      cursor: pointer;
      min-width: 180px;
      transition: border var(--transition);
    }

    .toolbar select:focus {
      border-color: var(--accent)
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px 10px 38px;
      border-radius: 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border var(--transition), box-shadow var(--transition);
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow)
    }

    .search-input::placeholder {
      color: var(--text-muted)
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none
    }

    /* ── Table ────────────────────────────── */
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border)
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px
    }

    thead {
      background: var(--surface-2)
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-dim);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color var(--transition);
    }

    th:hover {
      color: var(--accent)
    }

    th.sorted {
      color: var(--accent)
    }

    td {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      white-space: nowrap
    }

    tr {
      transition: background var(--transition)
    }

    tr:hover {
      background: var(--surface-2)
    }

    .empty-row td {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 16px;
      font-size: 14px
    }

    /* ── Stats bar ───────────────────────── */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .stat-card {
      flex: 1;
      min-width: 140px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
    }

    .stat-card .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-dim);
      margin-bottom: 4px
    }

    .stat-card .value {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent)
    }

    /* ── Loading spinner ─────────────────── */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .loading-state {
      text-align: center;
      padding: 40px;
      color: var(--text-dim)
    }

    /* ── Hidden ───────────────────────────── */
    .hidden {
      display: none !important
    }

    /* ── Responsive ──────────────────────── */
    @media(max-width:600px) {
      .app {
        padding: 12px 10px
      }

      .header {
        padding: 14px 16px
      }

      .header h1 {
        font-size: 15px
      }

      .card {
        padding: 20px 16px
      }

      #loginSection {
        margin: 40px auto
      }

      .toolbar {
        flex-direction: column
      }

      .toolbar select {
        width: 100%;
        min-width: auto
      }

      .search-wrap {
        width: 100%;
        min-width: auto
      }

      .stats-bar {
        flex-direction: column
      }

      .stat-card {
        min-width: auto
      }

      td,
      th {
        padding: 10px 12px;
        font-size: 12px
      }
    }

    /* ── View Tabs ────────────────────────── */
    .view-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px
    }

    .view-tab {
      padding: 9px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-dim);
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
    }

    .view-tab:hover {
      color: var(--text);
      border-color: var(--text-dim)
    }

    .view-tab.active {
      background: linear-gradient(135deg, var(--accent), #6d28d9);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 0 14px var(--accent-glow);
    }

    /* ── Calendar ─────────────────────────── */
    #calendarWrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 20px;
      position: relative;
      min-height: 500px;
    }

    #calendar {
      min-height: 480px
    }

    .fc {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px
    }

    .fc .fc-toolbar-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text)
    }

    .fc .fc-button {
      background: var(--surface-2) !important;
      border: 1px solid var(--border) !important;
      color: var(--text-dim) !important;
      font-size: 12px !important;
      padding: 6px 12px !important;
      border-radius: 8px !important;
      text-transform: capitalize !important;
    }

    .fc .fc-button:hover {
      color: var(--text) !important;
      border-color: var(--text-dim) !important
    }

    .fc .fc-button-active {
      background: var(--accent) !important;
      color: #fff !important;
      border-color: var(--accent) !important;
    }

    .fc .fc-daygrid-day {
      background: var(--surface);
      border-color: var(--border)
    }

    .fc .fc-daygrid-day.fc-day-today {
      background: var(--surface-2)
    }

    .fc .fc-daygrid-day-number {
      color: var(--text-dim);
      font-size: 12px;
      padding: 6px 8px
    }

    .fc .fc-day-today .fc-daygrid-day-number {
      color: var(--accent);
      font-weight: 700
    }

    .fc .fc-col-header-cell {
      background: var(--surface-2);
      border-color: var(--border)
    }

    .fc .fc-col-header-cell-cushion {
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 8px 4px
    }

    .fc .fc-scrollgrid {
      border-color: var(--border)
    }

    .fc td,
    .fc th {
      border-color: var(--border) !important
    }

    .fc .fc-daygrid-event {
      background: linear-gradient(135deg, rgba(167, 139, 250, .25), rgba(109, 40, 217, .25)) !important;
      border: 1px solid var(--accent) !important;
      border-radius: 6px !important;
      padding: 2px 6px !important;
      margin: 1px 2px !important;
      cursor: pointer;
    }

    .fc .fc-daygrid-event .fc-event-title {
      color: var(--text);
      font-size: 11px;
      font-weight: 500
    }

    .fc .fc-daygrid-event .fc-event-time {
      color: var(--accent);
      font-size: 10px;
      font-weight: 600
    }

    .fc .fc-timegrid-event {
      background: linear-gradient(135deg, rgba(167, 139, 250, .3), rgba(109, 40, 217, .3)) !important;
      border: 1px solid var(--accent) !important;
      border-radius: 6px !important;
      cursor: pointer;
    }

    .fc .fc-timegrid-event .fc-event-title {
      color: var(--text);
      font-size: 11px
    }

    .fc .fc-timegrid-event .fc-event-time {
      color: var(--accent);
      font-size: 10px;
      font-weight: 600
    }

    .fc .fc-timegrid-slot {
      border-color: var(--border) !important
    }

    .fc .fc-timegrid-axis-cushion {
      color: var(--text-muted);
      font-size: 10px
    }

    .fc .fc-more-link {
      color: var(--accent);
      font-size: 11px;
      font-weight: 600
    }

    .cal-loading {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      background: rgba(11, 11, 16, .7);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-lg);
    }

    .cal-loading.hidden {
      display: none
    }

    /* ── Event Modal ──────────────────────── */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      background: rgba(0, 0, 0, .6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn .2s ease both;
    }

    .modal-overlay.hidden {
      display: none;
      animation: none
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      width: 90%;
      max-width: 400px;
      animation: fadeIn .25s ease both;
    }

    .modal h3 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--accent)
    }

    .modal-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border)
    }

    .modal-row:last-of-type {
      border-bottom: none
    }

    .modal-row .modal-icon {
      font-size: 18px;
      flex-shrink: 0;
      width: 28px;
      text-align: center
    }

    .modal-row .modal-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .5px
    }

    .modal-row .modal-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--text)
    }

    .modal-close {
      width: 100%;
      margin-top: 20px;
      padding: 11px;
      border-radius: 10px;
      border: none;
      background: var(--surface-2);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
    }

    .modal-close:hover {
      color: var(--text);
      background: var(--surface-3)
    }

    /* ── Toast ───────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      z-index: 2000;
      pointer-events: none;
      transition: transform .3s ease, opacity .3s ease;
      opacity: 0;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1
    }

    .toast.success {
      background: #065f46;
      color: #6ee7b7;
      border: 1px solid #34d399
    }

    .toast.error {
      background: #7f1d1d;
      color: #fca5a5;
      border: 1px solid #f87171
    }

    @media(max-width:380px) {
      .header-logo {
        width: 36px;
        height: 36px;
        font-size: 14px
      }

      .header h1 {
        font-size: 14px
      }

      .btn {
        padding: 8px 14px;
        font-size: 12px
      }
    }
  </style>
</head>

<body>

  <div id="toast" class="toast"></div>

  <div class="app" id="app">

    <!-- ═══ LOGIN SECTION ═══ -->
    <div id="loginSection" class="card">
      <h2>🔐 Admin Giriş</h2>
      <p class="subtitle">İşletme panelinize erişin</p>
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" id="loginEmail" placeholder="ornek@email.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn btn-primary login-btn" id="loginBtn" onclick="handleLogin()">Giriş Yap</button>
      <div class="error-msg" id="loginError"></div>
    </div>

    <!-- ═══ DASHBOARD SECTION ═══ -->
    <div id="dashboardSection" class="hidden">

      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <div class="header-logo">DM</div>
          <div>
            <h1>Admin Panel</h1>
            <div class="header-subtitle" id="userEmail"></div>
          </div>
        </div>
        <div class="header-actions">
          <select id="businessSelect" onchange="onBusinessChange()"></select>
          <button class="btn btn-ghost" onclick="loadAppointments()">🔄 Yenile</button>
          <button class="btn btn-danger" onclick="handleLogout()">Çıkış</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-bar">
        <div class="stat-card">
          <div class="label">Toplam Randevu</div>
          <div class="value" id="statTotal">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Bugünkü</div>
          <div class="value" id="statToday">0</div>
        </div>
        <div class="stat-card">
          <div class="label">İşletme</div>
          <div class="value" id="statBusiness">—</div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="searchInput" placeholder="İsim veya telefon ara..."
            oninput="filterAppointments()" />
        </div>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th onclick="sortBy('created_at')" id="th-created_at" class="sorted">Tarih ↓</th>
              <th onclick="sortBy('name')" id="th-name">İsim</th>
              <th onclick="sortBy('phone')" id="th-phone">Telefon</th>
              <th onclick="sortBy('service')" id="th-service">Hizmet</th>
              <th onclick="sortBy('appointment_date')" id="th-appointment_date">Randevu Tarihi</th>
            </tr>
          </thead>
          <tbody id="appointmentsBody">
            <tr class="empty-row">
              <td colspan="5">Yükleniyor...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- View Tabs -->
      <div class="view-tabs">
        <button class="view-tab active" id="tabTable" onclick="switchView('table')">📋 Liste</button>
        <button class="view-tab" id="tabCalendar" onclick="switchView('calendar')">📅 Takvim</button>
      </div>

      <!-- Calendar -->
      <div id="calendarWrap" class="hidden">
        <div class="cal-loading hidden" id="calLoading"><span class="spinner"></span></div>
        <div id="calendar"></div>
      </div>

    </div>

    <!-- Event Modal -->
    <div class="modal-overlay hidden" id="eventModal" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>📋 Randevu Detayı</h3>
        <div class="modal-row"><span class="modal-icon">👤</span>
          <div>
            <div class="modal-label">İsim</div>
            <div class="modal-value" id="modalName">—</div>
          </div>
        </div>
        <div class="modal-row"><span class="modal-icon">📞</span>
          <div>
            <div class="modal-label">Telefon</div>
            <div class="modal-value" id="modalPhone">—</div>
          </div>
        </div>
        <div class="modal-row"><span class="modal-icon">💇</span>
          <div>
            <div class="modal-label">Hizmet</div>
            <div class="modal-value" id="modalService">—</div>
          </div>
        </div>
        <div class="modal-row"><span class="modal-icon">📅</span>
          <div>
            <div class="modal-label">Randevu Tarihi</div>
            <div class="modal-value" id="modalDate">—</div>
          </div>
        </div>
        <button class="modal-close"
          onclick="document.getElementById('eventModal').classList.add('hidden')">Kapat</button>
      </div>
    </div>

  </div>

  <script>
    // ─── State ─────────────────────────────────────────────
    var sb = null;  // Supabase client ("supabase" CDN tarafından kullanılıyor)
    var allAppointments = [];
    var currentBusinessId = null;
    var sortField = "created_at";
    var sortAsc = false;
    var calendar = null;
    var currentView = "table";

    // ─── Init ──────────────────────────────────────────────
    async function init() {
      try {
        var res = await fetch("/api/config");
        var config = await res.json();
        sb = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);

        // Check existing session
        var { data: { session } } = await sb.auth.getSession();
        if (session) {
          showDashboard(session.user);
        }
      } catch (err) {
        console.error("Config yüklenemedi:", err);
      }
    }

    // ─── Auth ──────────────────────────────────────────────
    async function handleLogin() {
      var email = document.getElementById("loginEmail").value.trim();
      var password = document.getElementById("loginPassword").value;
      var errorEl = document.getElementById("loginError");
      var btn = document.getElementById("loginBtn");

      if (!email || !password) {
        errorEl.textContent = "E-posta ve şifre gerekli.";
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Giriş yapılıyor...';
      errorEl.textContent = "";

      var { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.textContent = error.message === "Invalid login credentials"
          ? "E-posta veya şifre hatalı."
          : error.message;
        btn.disabled = false;
        btn.textContent = "Giriş Yap";
        return;
      }

      showDashboard(data.user);
    }

    async function handleLogout() {
      await sb.auth.signOut();
      document.getElementById("loginSection").classList.remove("hidden");
      document.getElementById("dashboardSection").classList.add("hidden");
      document.getElementById("loginPassword").value = "";
      document.getElementById("loginError").textContent = "";
      document.getElementById("loginBtn").disabled = false;
      document.getElementById("loginBtn").textContent = "Giriş Yap";
    }

    // Enter key for login
    document.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !document.getElementById("loginSection").classList.contains("hidden")) {
        handleLogin();
      }
    });

    // ─── Dashboard ─────────────────────────────────────────
    async function showDashboard(user) {
      document.getElementById("loginSection").classList.add("hidden");
      document.getElementById("dashboardSection").classList.remove("hidden");
      document.getElementById("userEmail").textContent = user.email;

      await loadBusinesses(user.id);
    }

    // ─── Businesses ────────────────────────────────────────
    async function loadBusinesses(userId) {
      var { data, error } = await sb
        .from("business_members")
        .select("business_id, role, businesses(id, name, slug)")
        .eq("user_id", userId);

      var select = document.getElementById("businessSelect");
      select.innerHTML = "";

      if (error || !data || data.length === 0) {
        select.innerHTML = '<option value="">İşletme bulunamadı</option>';
        document.getElementById("statBusiness").textContent = "—";
        return;
      }

      data.forEach(function (membership) {
        var biz = membership.businesses;
        if (!biz) return;
        var opt = document.createElement("option");
        opt.value = biz.id;
        opt.textContent = biz.name + " (" + membership.role + ")";
        select.appendChild(opt);
      });

      currentBusinessId = select.value;
      if (data[0] && data[0].businesses && data[0].businesses.name) {
        document.getElementById("statBusiness").textContent = data[0].businesses.name;
      }

      await loadAppointments();
    }

    // ─── Appointments ──────────────────────────────────────
    async function loadAppointments() {
      if (!currentBusinessId) return;

      var tbody = document.getElementById("appointmentsBody");
      tbody.innerHTML = '<tr class="empty-row"><td colspan="5"><span class="spinner"></span> Yükleniyor...</td></tr>';

      var { data, error } = await sb
        .from("appointments")
        .select("*")
        .eq("business_id", currentBusinessId)
        .order("created_at", { ascending: false });

      if (error) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Hata: ' + error.message + '</td></tr>';
        return;
      }

      allAppointments = data || [];
      updateStats();
      renderAppointments();
    }

    function onBusinessChange() {
      var select = document.getElementById("businessSelect");
      currentBusinessId = select.value;
      var selectedText = select.options[select.selectedIndex] ? select.options[select.selectedIndex].textContent : "—";
      document.getElementById("statBusiness").textContent = selectedText.replace(/ \(.+\)$/, "");
      loadAppointments();
      if (calendar) calendar.refetchEvents();
    }

    // ─── View Toggle ─────────────────────────────────────
    function switchView(view) {
      currentView = view;
      document.getElementById("tabTable").classList.toggle("active", view === "table");
      document.getElementById("tabCalendar").classList.toggle("active", view === "calendar");

      var tableSection = document.querySelector(".toolbar");
      var tableWrap = document.querySelector(".table-wrap");
      var calWrap = document.getElementById("calendarWrap");

      if (view === "calendar") {
        tableSection.classList.add("hidden");
        tableWrap.classList.add("hidden");
        calWrap.classList.remove("hidden");
        if (!calendar) initCalendar();
        setTimeout(function () { calendar.updateSize(); }, 50);
      } else {
        tableSection.classList.remove("hidden");
        tableWrap.classList.remove("hidden");
        calWrap.classList.add("hidden");
      }
    }

    // ─── Calendar ─────────────────────────────────────────
    function initCalendar() {
      var calEl = document.getElementById("calendar");
      calendar = new FullCalendar.Calendar(calEl, {
        timeZone: "local",
        locale: "tr",
        initialView: "dayGridMonth",
        height: "auto",
        editable: true,
        eventDurationEditable: false,
        headerToolbar: {
          left: "prev,next today",
          center: "title",
          right: "dayGridMonth,timeGridWeek,timeGridDay"
        },
        events: function (fetchInfo, successCallback, failureCallback) {
          if (!currentBusinessId || !sb) {
            successCallback([]);
            return;
          }
          sb.from("appointments")
            .select("id,name,phone,service,appointment_date")
            .eq("business_id", currentBusinessId)
            .gte("appointment_date", fetchInfo.startStr)
            .lt("appointment_date", fetchInfo.endStr)
            .order("appointment_date", { ascending: true })
            .then(function (result) {
              if (result.error) {
                failureCallback(result.error);
                return;
              }
              var mapped = (result.data || []).map(function (apt) {
                return {
                  id: apt.id,
                  title: (apt.name || "") + " - " + (apt.service || ""),
                  start: apt.appointment_date,
                  allDay: false,
                  extendedProps: {
                    phone: apt.phone,
                    service: apt.service,
                    name: apt.name
                  }
                };
              });
              successCallback(mapped);
            });
        },
        loading: function (isLoading) {
          var el = document.getElementById("calLoading");
          if (isLoading) el.classList.remove("hidden");
          else el.classList.add("hidden");
        },
        eventClick: function (info) {
          var props = info.event.extendedProps;
          document.getElementById("modalName").textContent = props.name || "—";
          document.getElementById("modalPhone").textContent = props.phone || "—";
          document.getElementById("modalService").textContent = props.service || "—";
          var start = info.event.start;
          document.getElementById("modalDate").textContent = start
            ? start.toLocaleDateString("tr-TR", { day: "2-digit", month: "long", year: "numeric" }) + " " + start.toLocaleTimeString("tr-TR", { hour: "2-digit", minute: "2-digit" })
            : "—";
          document.getElementById("eventModal").classList.remove("hidden");
        },
        eventDidMount: function (info) {
          info.el.title = info.event.extendedProps.name + " | " + info.event.extendedProps.service;
        },
        eventDrop: async function (info) {
          var newDate = info.event.start.toISOString();
          var appointmentId = info.event.id;

          var conflictResult = await sb
            .from("appointments")
            .select("id")
            .eq("business_id", currentBusinessId)
            .eq("appointment_date", newDate)
            .neq("id", appointmentId)
            .limit(1);

          if (conflictResult.data && conflictResult.data.length > 0) {
            info.revert();
            showToast("Bu saat için zaten randevu var.", "error");
            return;
          }

          var updateResult = await sb
            .from("appointments")
            .update({ appointment_date: newDate })
            .eq("id", appointmentId)
            .eq("business_id", currentBusinessId);

          if (updateResult.error) {
            console.error("Update hatası:", updateResult.error);
            info.revert();
            showToast("Güncelleme başarısız oldu.", "error");
            return;
          }

          showToast("Randevu güncellendi", "success");
        }
      });
      calendar.render();
    }

    function closeModal(e) {
      if (e.target === document.getElementById("eventModal")) {
        e.target.classList.add("hidden");
      }
    }

    function showToast(msg, type) {
      var el = document.getElementById("toast");
      el.textContent = msg;
      el.className = "toast " + (type || "success");
      setTimeout(function () { el.classList.add("show"); }, 10);
      setTimeout(function () { el.classList.remove("show"); }, 3000);
    }

    // ─── Render ────────────────────────────────────────────
    function renderAppointments() {
      var tbody = document.getElementById("appointmentsBody");
      var search = document.getElementById("searchInput").value.toLowerCase().trim();

      var filtered = allAppointments;
      if (search) {
        filtered = filtered.filter(function (a) {
          return (a.name || "").toLowerCase().includes(search) ||
            (a.phone || "").toLowerCase().includes(search);
        });
      }

      // Sort
      filtered.sort(function (a, b) {
        var aVal = (a[sortField] || "").toString().toLowerCase();
        var bVal = (b[sortField] || "").toString().toLowerCase();
        if (aVal < bVal) return sortAsc ? -1 : 1;
        if (aVal > bVal) return sortAsc ? 1 : -1;
        return 0;
      });

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Randevu bulunamadı</td></tr>';
        return;
      }

      var html = "";
      filtered.forEach(function (a) {
        html += '<tr>' +
          '<td>' + formatDate(a.created_at) + '</td>' +
          '<td><strong>' + esc(a.name) + '</strong></td>' +
          '<td>' + esc(a.phone) + '</td>' +
          '<td>' + esc(a.service) + '</td>' +
          '<td>' + (a.appointment_date ? formatDate(a.appointment_date) : esc(a.date)) + '</td>' +
          '</tr>';
      });
      tbody.innerHTML = html;
    }

    // ─── Utils ─────────────────────────────────────────────
    function filterAppointments() {
      renderAppointments();
    }

    function sortBy(field) {
      document.querySelectorAll("th").forEach(function (th) { th.classList.remove("sorted"); });

      if (sortField === field) {
        sortAsc = !sortAsc;
      } else {
        sortField = field;
        sortAsc = true;
      }

      var th = document.getElementById("th-" + field);
      if (th) {
        th.classList.add("sorted");
        th.textContent = th.textContent.replace(/ [↑↓]$/, "") + (sortAsc ? " ↑" : " ↓");
      }

      renderAppointments();
    }

    function updateStats() {
      document.getElementById("statTotal").textContent = allAppointments.length;

      // Bugünkü randevuları appointment_date üzerinden hesapla (Istanbul timezone)
      var now = new Date();
      var todayStr = now.getFullYear() + '-' +
        String(now.getMonth() + 1).padStart(2, '0') + '-' +
        String(now.getDate()).padStart(2, '0');

      var todayCount = allAppointments.filter(function (a) {
        var dateField = a.appointment_date || a.created_at;
        if (!dateField) return false;
        // appointment_date varsa randevu tarihine göre, yoksa created_at'a göre
        return dateField.startsWith(todayStr);
      }).length;
      document.getElementById("statToday").textContent = todayCount;
    }

    function formatDate(iso) {
      if (!iso) return "—";
      var d = new Date(iso);
      return d.toLocaleDateString("tr-TR", { day: "2-digit", month: "2-digit", year: "numeric" })
        + " " + d.toLocaleTimeString("tr-TR", { hour: "2-digit", minute: "2-digit" });
    }

    function esc(str) {
      if (!str) return "—";
      var div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    // ─── Start ─────────────────────────────────────────────
    init();
  </script>

</body>

</html>
